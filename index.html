<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<tilte>Trip Planner</tilte>
 <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>plan your trip</h1>
        <p>Get routes for buses, trains, bikes, or walking with real-time updates</p>
</header>
</body>

<main>
    <form id="trip-form"></form>
   <label for="from">From:</label>
            <input type="text" id="from" placeholder="Enter starting point">

            <label for="to">To:</label>
            <input type="text" id="to" placeholder="Enter destination">

             <label for="mode">Transport Mode:</label>
            <select id="mode">
                <option value="bus">Bus</option>
                <option value="train">Train</option>
                <option value="bike">Bike</option>
                <option value="walking">Walking</option>
            </select>

            <button type="submit">Plan Trip</button>
        </form>

        <section id="results">
            <!--trip results will apper here-->
        </section>
</main>
<script src="script.js"></script>
</body>
</html>
